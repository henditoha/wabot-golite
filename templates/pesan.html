{{define "content"}}
<style>
/* ── BASE ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;}

.main-panel {
  flex: 1 1 auto !important;
  width: 100% !important;
  max-width: 100% !important;
}

.chat-wrapper {
  display: flex !important;
  flex-direction: column !important;
  width: 100% !important;
  height: 100% !important;
  min-width: 100% !important;
  max-width: 100% !important;
  flex: 1 1 100% !important;
  position: relative;
  overflow: hidden;
}

/* ── HEADER ───────────────────────────────────────────────── */
.chat-header {
  width: 100% !important;
  height: 59px;background: #f0f2f5;
  display: flex;align-items: center;padding: 0 16px;gap: 12px;
  flex-shrink: 0;z-index: 20;border-bottom: 1px solid #e9edef;
}
.chat-avatar{
  width:40px;height:40px;border-radius:50%;background:#dfe5e7;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:opacity .15s;
}
.chat-avatar:hover{opacity:.85;}
.chat-avatar i{font-size:18px;color:#54656f;}
.chat-header-info{flex:1;min-width:0;cursor:pointer;}
.chat-header-name{font-size:16px;font-weight:500;color:#111b21;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.chat-header-sub{font-size:13px;color:#54656f;transition:color .2s;}
.chat-header-actions{display:flex;align-items:center;gap:2px;}
.hdr-btn{
  width:38px;height:38px;border-radius:50%;border:none;background:transparent;
  color:#54656f;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s;position:relative;
}
.hdr-btn:hover{background:#e9edef;}
.hdr-btn.active{color:#00a884;}

/* ── SEARCH PANEL ─────────────────────────────────────────── */
.search-panel{
  width: 100% !important;
  background:#fff;border-bottom:1px solid #e9edef;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  flex-shrink:0;z-index:15;overflow:hidden;
  max-height:0;transition:max-height .25s ease,padding .25s ease;
}
.search-panel.open{max-height:55px;padding:8px 16px;}
.search-inner{
  flex:1;background:#f0f2f5;border-radius:8px;
  display:flex;align-items:center;padding:0 12px;height:35px;gap:8px;
}
.search-inner input{
  flex:1;border:none;background:transparent;outline:none;
  font-size:14px;color:#111b21;caret-color:#00a884;
  font-family:inherit;
}
.search-inner input::placeholder{color:#54656f;}
.search-nav{display:flex;align-items:center;gap:4px;}
.search-count{font-size:12px;color:#54656f;min-width:60px;text-align:right;}
.search-close{
  width:34px;height:34px;border-radius:50%;border:none;background:transparent;
  color:#54656f;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.search-close:hover{background:#f0f2f5;}

/* ── WELCOME ──────────────────────────────────────────────── */
.welcome-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:40px;z-index:1;user-select:none;
}
.welcome-icon{
  width:200px;height:200px;border-radius:50%;
  background:rgba(0,168,132,.08);
  display:flex;align-items:center;justify-content:center;
}
.welcome-icon i{font-size:95px;color:#00a884;opacity:.65;}
.welcome-title{font-size:32px;font-weight:300;color:#111b21;letter-spacing:-.3px;}
.welcome-desc{font-size:14px;color:#54656f;text-align:center;max-width:380px;line-height:1.6;}
.welcome-lock{
  display:flex;align-items:center;gap:6px;font-size:13px;color:#54656f;
  border-top:1px solid #e9edef;padding-top:20px;
}

/* ── MESSAGES AREA ────────────────────────────────────────── */
.chat-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 6.5% 8px;
  display:flex;flex-direction:column;gap:2px;z-index:1;
  width: 100% !important;
}
.chat-body::-webkit-scrollbar{width:6px;}
.chat-body::-webkit-scrollbar-thumb{background:#cdd3d7;border-radius:3px;}

.date-divider{display:flex;align-items:center;justify-content:center;margin:8px 0 10px;}
.date-divider span{
  background:#e1f2fa;color:#54656f;font-size:12px;font-weight:500;
  padding:5px 12px;border-radius:7.5px;
  box-shadow:0 1px 0.5px rgba(11,20,26,.13);
}

.msg-row{
  display:flex;align-items:flex-end;gap:4px;
  max-width:65%;margin-bottom:2px;
  animation:popIn .18s ease-out;
}
.msg-row.out{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.in {align-self:flex-start;}
@keyframes popIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

.sender-avatar{
  width:28px;height:28px;border-radius:50%;background:#dfe5e7;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-bottom:2px;cursor:pointer;
}
.sender-avatar i{font-size:12px;color:#54656f;}

.msg-bubble{
  position:relative;padding:6px 7px 8px 9px;
  border-radius:7.5px;font-size:14.5px;line-height:1.5;
  box-shadow:0 1px 0.5px rgba(11,20,26,.13);
  word-break:break-word;max-width:100%;
  cursor:pointer;transition:filter .1s;
}
.msg-bubble:hover{filter:brightness(.97);}
.msg-row.out .msg-bubble{background:#d9fdd3;border-top-right-radius:2px;}
.msg-row.out .msg-bubble::after{
  content:"";position:absolute;top:0;right:-8px;
  border-left:8px solid #d9fdd3;border-bottom:7px solid transparent;
}
.msg-row.in .msg-bubble{background:#fff;border-top-left-radius:2px;}
.msg-row.in .msg-bubble::before{
  content:"";position:absolute;top:0;left:-8px;
  border-right:8px solid #fff;border-bottom:7px solid transparent;
}
.msg-row.highlight .msg-bubble{
  outline:2px solid #00a884;outline-offset:1px;
}

/* Quoted / reply */
.quoted-block{
  background:rgba(0,0,0,.06);border-left:3px solid #00a884;
  border-radius:4px;padding:5px 8px;margin-bottom:5px;
  font-size:13px;cursor:pointer;
}
.quoted-sender{font-weight:500;color:#00a884;font-size:12.5px;margin-bottom:1px;}
.quoted-text{color:#54656f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;}

/* Media in bubble */
.msg-image{
  width:100%;max-width:320px;border-radius:5px;
  display:block;margin-bottom:4px;cursor:zoom-in;
  object-fit:cover;
}
.msg-doc{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.04);border-radius:6px;
  padding:8px 10px;margin-bottom:4px;min-width:200px;cursor:pointer;
}
.msg-doc-icon{font-size:22px;color:#00a884;flex-shrink:0;}
.msg-doc-name{font-size:13.5px;font-weight:500;color:#111b21;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.msg-doc-size{font-size:11.5px;color:#54656f;}
.msg-audio{
  display:flex;align-items:center;gap:10px;
  min-width:200px;margin-bottom:4px;
}
.msg-audio-play{
  width:36px;height:36px;border-radius:50%;
  background:#000;color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;transition:background .15s;
}
.msg-audio-play:hover{background:#008069;}
.msg-audio-wave{flex:1;height:28px;background:#00000010;border-radius:4px;}
.msg-audio-dur{font-size:11.5px;color:#54656f;flex-shrink:0;}

/* Revoked */
.msg-revoked{font-style:italic;color:#54656f;font-size:13.5px;}
.msg-revoked i{margin-right:4px;}

/* Sender name */
.bubble-sender{font-size:12.8px;font-weight:500;margin-bottom:2px;display:block;}
.bubble-text{color:#111b21;white-space:pre-wrap;word-break:break-word;}
.bubble-text mark{background:#fff176;border-radius:2px;padding:0 1px;color:#111b21;}

/* Reactions */
.msg-reactions{
  position:absolute;bottom:-12px;
  display:flex;gap:2px;
}
.msg-row.out .msg-reactions{left:6px;}
.msg-row.in  .msg-reactions{right:6px;}
.reaction-pill{
  background:#fff;border-radius:100px;
  padding:1px 5px;font-size:13px;
  box-shadow:0 1px 3px rgba(0,0,0,.18);
  cursor:pointer;display:flex;align-items:center;gap:2px;
}
.reaction-count{font-size:11px;color:#54656f;}

/* Meta */
.bubble-meta{
  display:inline-flex;align-items:flex-end;gap:3px;
  float:right;margin-left:8px;margin-top:2px;margin-bottom:-2px;
}
.bubble-time{font-size:11px;color:#54656f;white-space:nowrap;}
.bubble-tick{font-size:13px;}
.tick-read     {color:#53bdeb;}
.tick-delivered{color:#54656f;}
.tick-sent     {color:#54656f;}

/* ── CONTEXT MENU ────────────────────────────────────────── */
.ctx-menu{
  position:fixed;background:#fff;border-radius:6px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  z-index:9999;min-width:180px;overflow:hidden;
  animation:ctxIn .12s ease-out;
}
.ctx-menu.reaction-picker-menu {
  min-width: auto !important; 
  padding: 8px 12px;
  flex-direction: row;
  gap: 8px;
  display: flex;
  border-radius: 30px; 
}
@keyframes ctxIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.ctx-item{
  padding:11px 16px;font-size:14.5px;color:#111b21;
  cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:background .1s;
}
.ctx-item:hover{background:#f5f6f6;}
.ctx-item.danger{color:#e53935;}
.ctx-item i{width:18px;text-align:center;color:#54656f;font-size:15px;}
.ctx-item.danger i{color:#e53935;}

/* ── EMOJI PICKER ───────────────────────────────────────── */
.emoji-picker{
  position:absolute;bottom:70px;left:16px;
  background:#fff;border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.18);
  z-index:500;width:340px;overflow:hidden;
  animation:ctxIn .15s ease-out;
}
.emoji-tabs{
  display:flex;border-bottom:1px solid #f0f2f5;
  padding:4px 8px 0;gap:2px;
}
.emoji-tab{
  flex:1;padding:8px 4px;border:none;background:transparent;
  font-size:18px;cursor:pointer;border-bottom:2px solid transparent;
  transition:border-color .15s;border-radius:4px 4px 0 0;
}
.emoji-tab.active{border-bottom-color:#00a884;}
.emoji-tab:hover{background:#f5f6f6;}
.emoji-grid{
  display:grid;grid-template-columns:repeat(8,1fr);
  padding:10px;gap:2px;max-height:220px;overflow-y:auto;
}
.emoji-grid::-webkit-scrollbar{width:4px;}
.emoji-grid::-webkit-scrollbar-thumb{background:#cdd3d7;border-radius:2px;}
.emoji-btn{
  font-size:22px;padding:5px;border:none;background:transparent;
  cursor:pointer;border-radius:6px;transition:background .1s;
  text-align:center;
}
.emoji-btn:hover{background:#f5f6f6;}

/* ── ATTACHMENT MENU ─────────────────────────────────────── */
.attach-menu{
  position:absolute;bottom:70px;left:58px;
  display:flex;flex-direction:column;gap:10px;
  z-index:500;padding:10px 0;
  animation:ctxIn .15s ease-out;
}
.attach-item{
  display:flex;align-items:center;gap:12px;cursor:pointer;
  padding:4px 0;
}
.attach-btn{
  width:48px;height:48px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .15s;
  flex-shrink:0;
}
.attach-btn:hover{transform:scale(1.08);}
.attach-label{
  background:#1d2129;color:#fff;font-size:13px;
  padding:5px 10px;border-radius:5px;white-space:nowrap;
}

/* ── IMAGE LIGHTBOX ─────────────────────────────────────── */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:9000;display:flex;align-items:center;justify-content:center;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:4px;object-fit:contain;}

/* PERBAIKAN KONTRAS LIGHTBOX CLOSE */
.lightbox-close{
  position:absolute;top:20px;right:20px;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,.6); /* Digelapkan menjadi 60% hitam */
  border:none;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.3); /* Penambahan bayangan */
}
.lightbox-close:hover{background:rgba(0,0,0,.8);}

/* ── FOOTER ──────────────────────────────────────────────── */
.chat-footer{
  width: 100% !important;
  height:62px;background:#f0f2f5;
  display:flex;align-items:center;
  padding:0 14px;gap:6px;
  flex-shrink:0;z-index:10;position:relative;
}
.footer-btn{
  width:42px;height:42px;border-radius:50%;border:none;background:transparent;
  color:#54656f;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,color .15s;flex-shrink:0;
}
.footer-btn:hover{background:#e9edef;}
.footer-btn.active{color:#00a884;}
.input-pill{
  flex:1;background:#fff;border-radius:8px;
  display:flex;align-items:center;padding:0 14px;min-height:42px;gap:8px;
}
.input-pill textarea{
  flex:1;border:none;outline:none;resize:none;overflow:hidden;
  font-size:15px;background:transparent;color:#111b21;
  caret-color:#00a884;font-family:inherit;
  padding:4px 0;line-height:1.5;max-height:120px;
}
.input-pill textarea::placeholder{color:#54656f;}
.send-btn{
  width:42px;height:42px;border-radius:50%;
  background:#000;color:#fff;
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:background .15s,transform .1s;
}
.send-btn:hover{background:#008069;}
.send-btn:active{transform:scale(.92);}

/* Reply bar */
.reply-bar{
  width: 100% !important;
  background:#f0f2f5;
  border-left:none;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 16px; 
  flex-shrink:0;
  z-index:9;
  border-top:0px solid transparent; 
  overflow:hidden;
  max-height:0;
  opacity:0; 
  transition:max-height .2s ease, padding .2s ease, opacity .2s ease, border-top .2s ease;
}
.reply-bar.open{
  max-height:60px;
  padding:8px 16px; 
  border-top:1px solid #e9edef;
  opacity:1; 
}
.reply-preview{
  flex:1;background:#fff;border-left:3px solid #00a884;
  border-radius:4px;padding:5px 10px;min-width:0;
}
.reply-sender{font-size:12.5px;font-weight:500;color:#00a884;}
.reply-text{font-size:13px;color:#54656f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-close{
  width:30px;height:30px;border-radius:50%;border:none;background:transparent;
  color:#54656f;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.reply-close:hover{background:#e9edef;}

/* Recording indicator */
.rec-bar{
  flex:1;display:flex;align-items:center;gap:12px;
  background:#fff;border-radius:8px;padding:0 14px;min-height:42px;
}
.rec-dot{
  width:10px;height:10px;border-radius:50%;background:#e53935;
  animation:blink 1s infinite;flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.rec-label{font-size:14px;color:#e53935;font-family:inherit;}
.rec-timer{font-size:14px;color:#54656f;font-family:inherit;margin-left:auto;}

/* Toast */
.toast-wrap{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;
}
.toast{
  background:#1d2129;color:#fff;font-size:13.5px;
  padding:8px 16px;border-radius:8px;
  animation:toastIn .2s ease;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>

<div class="chat-wrapper"
     x-data="chatRoom"
     @open-chat.window="loadChat($event.detail)"
     @ws-message.window="handleIncoming($event.detail)"
     @click="closeAll($event)">

  <div class="chat-header" x-show="activeJid !== ''" x-cloak>
    <div class="chat-avatar">
      <i class="fa-solid" :class="activeJid.includes('@g.us') ? 'fa-users' : 'fa-user'"></i>
    </div>
    <div class="chat-header-info" @click="showContactInfo()">
      <div class="chat-header-name" x-text="activeName"></div>
      <div class="chat-header-sub"
           :class="typingText ? 'text-success' : ''"
           x-text="typingText || (activeJid.includes('@g.us') ? 'Grup' : 'Online')"></div>
    </div>
    <div class="chat-header-actions">
      <button class="hdr-btn" :class="searchOpen ? 'active' : ''" @click.stop="toggleSearch()" title="Cari">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="hdr-btn" @click.stop="showChatMenu($event)" title="Menu lainnya">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </div>
  </div>

  <div class="search-panel" :class="searchOpen ? 'open' : ''">
    <div class="search-inner">
      <i class="fa-solid fa-magnifying-glass" style="color:#54656f;font-size:14px;"></i>
      <input type="text" placeholder="Cari dalam percakapan"
             x-model="searchQuery"
             @input="doSearch()"
             @keyup.enter="nextMatch()"
             @keyup.escape="toggleSearch()"
             x-ref="searchInput">
    </div>
    <div class="search-nav" x-show="searchResults.length > 0">
      <span class="search-count" x-text="searchResults.length > 0 ? (searchIdx+1)+' / '+searchResults.length : ''"></span>
      <button class="search-close" @click="prevMatch()" title="Sebelumnya"><i class="fa-solid fa-chevron-up"></i></button>
      <button class="search-close" @click="nextMatch()" title="Berikutnya"><i class="fa-solid fa-chevron-down"></i></button>
    </div>
    <button class="search-close" @click="toggleSearch()"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div class="welcome-screen" x-show="activeJid === ''" x-cloak>
    <div class="welcome-icon"><i class="fa-brands fa-whatsapp"></i></div>
    <div class="welcome-title">WhatsApp Web</div>
    <div class="welcome-desc">
      Kirim dan terima pesan tanpa menyimpan ponsel Anda.<br>
      Sistem Informasi Keperawatan (Terintegrasi WhatsApp)
    </div>
    <div class="welcome-lock">
      <i class="fa-solid fa-lock" style="font-size:12px;"></i>
      Enkripsi end-to-end
    </div>
  </div>

  <div class="chat-body" id="chat-box" x-show="activeJid !== ''" x-cloak>
    <div class="date-divider"><span>PESAN</span></div>

    <template x-for="msg in messages" :key="msg.id">
      <div class="msg-row" :class="[msg.is_from_me ? 'out' : 'in', searchResults.includes(msg.id) && searchResults[searchIdx]===msg.id ? 'highlight' : '']"
           :data-id="msg.id"
           @contextmenu.prevent.stop="openCtx($event, msg)">

        <template x-if="!msg.is_from_me && activeJid.includes('@g.us')">
          <div class="sender-avatar"><i class="fa-solid fa-user"></i></div>
        </template>

        <div class="msg-bubble">
          <template x-if="!msg.is_from_me && activeJid.includes('@g.us')">
            <span class="bubble-sender" :style="'color:'+senderColor(msg.sender_name)" x-text="msg.sender_name"></span>
          </template>

          <template x-if="msg.quoted_text">
            <div class="quoted-block" @click.stop="scrollToMsg(msg.quoted_id)">
              <div class="quoted-sender" x-text="msg.quoted_sender || 'Anda'"></div>
              <div class="quoted-text" x-text="msg.quoted_text"></div>
            </div>
          </template>

          <template x-if="msg.type === 'image' && !msg.revoked">
            <img class="msg-image" :src="msg.media_url || '/api/media/'+msg.id"
                 alt="Gambar lampiran"
                 @click.stop="openLightbox(msg.media_url || '/api/media/'+msg.id)"
                 loading="lazy">
          </template>

          <template x-if="msg.type === 'document' && !msg.revoked">
            <div class="msg-doc" @click.stop="downloadMedia(msg)">
              <i class="fa-solid fa-file-lines msg-doc-icon"></i>
              <div style="min-width:0;">
                <div class="msg-doc-name" x-text="msg.filename || 'Dokumen'"></div>
                <div class="msg-doc-size" x-text="msg.file_size || ''"></div>
              </div>
              <i class="fa-solid fa-download" style="color:#54656f;margin-left:auto;font-size:15px;"></i>
            </div>
          </template>

          <template x-if="(msg.type === 'audio' || msg.type === 'ptt') && !msg.revoked">
            <div class="msg-audio">
              <button class="msg-audio-play" @click.stop="playAudio(msg)" :title="'Putar audio'">
                <i class="fa-solid" :class="playingId === msg.id ? 'fa-pause' : 'fa-play'" style="margin-left:1px;"></i>
              </button>
              <div class="msg-audio-wave"></div>
              <span class="msg-audio-dur" x-text="msg.duration || '0:00'"></span>
            </div>
          </template>

          <template x-if="msg.revoked">
            <span class="msg-revoked"><i class="fa-solid fa-ban"></i>Pesan telah dihapus</span>
          </template>

          <template x-if="!msg.revoked && (!msg.type || msg.type === 'text')">
            <span class="bubble-text" x-html="highlightText(msg.content)"></span>
          </template>
          <template x-if="!msg.revoked && msg.type === 'image' && msg.content">
            <span class="bubble-text" style="display:block;margin-top:3px;" x-html="highlightText(msg.content)"></span>
          </template>

          <template x-if="msg.reactions && msg.reactions.length > 0">
            <div class="msg-reactions">
              <template x-for="r in msg.reactions" :key="r.emoji">
                <div class="reaction-pill" @click.stop="sendReaction(msg, r.emoji)" :title="r.senders ? r.senders.join(', ') : ''">
                  <span x-text="r.emoji"></span>
                  <span class="reaction-count" x-show="r.count > 1" x-text="r.count"></span>
                </div>
              </template>
            </div>
          </template>

          <div class="bubble-meta">
            <span class="bubble-time" x-text="msg.display_time"></span>
            <template x-if="msg.is_from_me">
              <span class="bubble-tick">
                <template x-if="msg.status === 'read'">
                  <i class="fa-solid fa-check-double tick-read"></i>
                </template>
                <template x-if="msg.status === 'delivered'">
                  <i class="fa-solid fa-check-double tick-delivered"></i>
                </template>
                <template x-if="msg.status === 'sent' || msg.status === ''">
                  <i class="fa-solid fa-check tick-sent"></i>
                </template>
                <template x-if="msg.status === 'error'">
                  <i class="fa-solid fa-circle-exclamation" style="color:#e53935;"></i>
                </template>
              </span>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <div class="reply-bar" :class="replyTo ? 'open' : ''" x-show="activeJid !== ''" x-cloak>
    <i class="fa-solid fa-reply" style="color:#00a884;font-size:16px;flex-shrink:0;"></i>
    <div class="reply-preview">
      <div class="reply-sender" x-text="replyTo ? (replyTo.is_from_me ? 'Anda' : replyTo.sender_name || activeName) : ''"></div>
      <div class="reply-text" x-text="replyTo ? replyTo.content : ''"></div>
    </div>
    <button class="reply-close" @click="replyTo = null"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div class="chat-footer" x-show="activeJid !== ''" x-cloak>

    <div class="emoji-picker" x-show="emojiOpen" x-cloak @click.stop>
      <div class="emoji-tabs">
        <template x-for="(cat, idx) in emojiCats" :key="cat.label">
          <button class="emoji-tab" :class="emojiCatIdx === idx ? 'active' : ''"
                  @click="emojiCatIdx = idx" :title="cat.label" x-text="cat.icon"></button>
        </template>
      </div>
      <div class="emoji-grid">
        <template x-for="e in emojiCats[emojiCatIdx].emojis" :key="e">
          <button class="emoji-btn" @click.stop="insertEmoji(e)" x-text="e"></button>
        </template>
      </div>
    </div>

    <div class="attach-menu" x-show="attachOpen" x-cloak @click.stop>
      <div class="attach-item">
        <button class="attach-btn" style="background:#bf59cf;" @click.stop="triggerFile('document')" title="Dokumen">
          <i class="fa-solid fa-file-lines"></i>
        </button>
        <span class="attach-label">Dokumen</span>
      </div>
      <div class="attach-item">
        <button class="attach-btn" style="background:#0099ff;" @click.stop="triggerFile('image')" title="Foto & Video">
          <i class="fa-solid fa-image"></i>
        </button>
        <span class="attach-label">Foto & Video</span>
      </div>
      <div class="attach-item">
        <button class="attach-btn" style="background:#04a784;" @click.stop="triggerFile('audio')" title="Audio">
          <i class="fa-solid fa-headphones"></i>
        </button>
        <span class="attach-label">Audio</span>
      </div>
    </div>

    <input type="file" id="file-document" x-ref="fileDocument" style="display:none" multiple
           @change="uploadFile($event, 'document')">
    <input type="file" id="file-image" x-ref="fileImage" style="display:none" multiple accept="image/*,video/*"
           @change="uploadFile($event, 'image')">
    <input type="file" id="file-audio" x-ref="fileAudio" style="display:none" accept="audio/*"
           @change="uploadFile($event, 'audio')">

    <button class="footer-btn" :class="emojiOpen ? 'active' : ''"
            @click.stop="emojiOpen = !emojiOpen; attachOpen = false" title="Emoji">
      <i class="fa-regular" :class="emojiOpen ? 'fa-keyboard' : 'fa-face-smile'"></i>
    </button>

    <button class="footer-btn" :class="attachOpen ? 'active' : ''"
            @click.stop="attachOpen = !attachOpen; emojiOpen = false" title="Lampirkan">
      <i class="fa-solid fa-paperclip" :style="attachOpen ? 'transform:rotate(45deg);' : ''"></i>
    </button>

    <div class="input-pill" x-show="!recording">
      <textarea rows="1" placeholder="Ketik pesan"
                x-model="inputText"
                x-ref="textInput"
                @keydown.enter.exact.prevent="sendMsg()"
                @keydown.enter.shift.exact="newLine()"
                @input="autoResize($el); sendTyping()"
                @focus="emojiOpen = false; attachOpen = false"></textarea>
    </div>

    <div class="rec-bar" x-show="recording" x-cloak>
      <div class="rec-dot"></div>
      <span class="rec-label">Merekam...</span>
      <span class="rec-timer" x-text="recTimerLabel"></span>
    </div>

    <template x-if="inputText.trim() !== ''">
      <button class="send-btn" @click="sendMsg()" title="Kirim">
        <i class="fa-solid fa-paper-plane" style="margin-left:2px;"></i>
      </button>
    </template>
    <template x-if="inputText.trim() === ''">
      <button class="send-btn" :style="recording ? 'background:#e53935;' : ''"
              @mousedown.prevent="startRecording()"
              @mouseup="stopRecording()"
              @mouseleave="stopRecording()"
              title="Tahan untuk rekam suara">
        <i class="fa-solid" :class="recording ? 'fa-stop' : 'fa-microphone'"></i>
      </button>
    </template>
  </div>

  <div class="ctx-menu" x-show="ctxVisible" x-cloak
       :style="'top:'+ctxY+'px;left:'+ctxX+'px'" @click.stop>
    
    <template x-if="ctxMsg">
      <div>
        <div class="ctx-item" @click="ctxReply()">
          <i class="fa-solid fa-reply"></i> Balas
        </div>
        <div class="ctx-item" @click="ctxForward()">
          <i class="fa-solid fa-share"></i> Teruskan
        </div>
        <div class="ctx-item" @click="ctxCopy()">
          <i class="fa-solid fa-copy"></i> Salin
        </div>
        <div class="ctx-item" @click="ctxStar()">
          <i class="fa-solid fa-star"></i> Bintangi
        </div>
        <div class="ctx-item" @click="ctxReact()">
          <i class="fa-solid fa-face-smile"></i> Reaksi
        </div>
        <template x-if="ctxMsg && ctxMsg.is_from_me">
          <div class="ctx-item danger" @click="ctxRevoke()">
            <i class="fa-solid fa-trash"></i> Hapus untuk semua
          </div>
        </template>
        <div class="ctx-item danger" @click="ctxDelete()">
          <i class="fa-solid fa-trash-can"></i> Hapus untuk saya
        </div>
      </div>
    </template>

    <template x-if="!ctxMsg">
      <div>
        <div class="ctx-item" @click="showContactInfo()">
          <i class="fa-solid fa-user"></i> Info Kontak
        </div>
        <div class="ctx-item danger" @click="closeChat()">
          <i class="fa-solid fa-xmark"></i> Tutup Obrolan
        </div>
      </div>
    </template>
  </div>

  <div class="ctx-menu reaction-picker-menu" x-show="reactPickerVisible" x-cloak
       :style="'top:'+reactY+'px;left:'+reactX+'px;'"
       @click.stop>
    <template x-for="e in quickEmojis" :key="e">
      <button style="font-size:24px;border:none;background:transparent;cursor:pointer;padding:2px 4px;border-radius:6px;transition:background .1s;"
              @mouseover="$el.style.background='#f5f6f6'"
              @mouseout="$el.style.background='transparent'"
              @click="sendReaction(ctxMsg, e); reactPickerVisible = false; ctxVisible = false;"
              x-text="e"></button>
    </template>
  </div>

  <div class="lightbox" x-show="lightboxUrl" x-cloak @click="lightboxUrl = null">
    <img :src="lightboxUrl" alt="Pratinjau gambar" @click.stop>
    <button class="lightbox-close" @click="lightboxUrl = null"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div class="toast-wrap" aria-live="polite">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast" x-text="t.msg"></div>
    </template>
  </div>

</div>

<script>
const EMOJI_CATS = [
  { label: 'Sering', icon: '🕐', emojis: ['😀','😂','🥰','😍','🤩','😎','🥳','😅','😭','🙏','👍','❤️','🔥','✅','💯','🎉','👏','🤝','💪','🫡'] },
  { label: 'Wajah', icon: '😊', emojis: ['😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','🥰','🤩','🥲','😐','😑','😶','🫥','😏','😒','🙄','😬','🤐','😮','😯','😲','😳','🥺','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','🤬','😈','👿','💀','☠️','🤡','👹','👺','👻','👽','👾','🤖'] },
  { label: 'Gestur', icon: '👋', emojis: ['👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','🫶','👐','🤲','🤝','🙏','✍️','💅','🤳','💪','🦾','🦵','🦶','👂','🦻','👃','🫦','👅','🦷'] },
  { label: 'Alam', icon: '🌿', emojis: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🦄','🐔','🐧','🐦','🦅','🦆','🦉','🐺','🦝','🌸','🌺','🌻','🌹','🌷','🌱','🌲','🌳','🍀','🌴','🍁','🍂','🌊','🌈','⛅','🌙','⭐','🌟','💫','🌍','🔥','💧','❄️'] },
  { label: 'Makanan', icon: '🍕', emojis: ['🍎','🍊','🍋','🍇','🍓','🫐','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🥑','🍆','🥦','🌽','🥕','🧅','🥔','🍠','🥐','🍞','🥖','🥨','🧀','🥚','🍳','🥞','🧇','🥓','🌭','🍔','🍟','🍕','🌮','🌯','🥙','🧆','🥚','🍜','🍝','🍲','🍛','🍣','🍱','🍤','🍙','🍚','🍘','🍥','🥮','🍢','🧁','🎂','🍮','🍭','🍬','🍫','🍿','☕','🍵','🥤','🧃','🍺','🥂'] },
  { label: 'Simbol', icon: '💡', emojis: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❤️‍🔥','💕','💞','💓','💗','💖','💘','💝','💟','☮️','✝️','☪️','🕉️','✡️','🔯','🆕','🆙','🆒','🆓','🆖','🅰️','🅱️','🆎','🆑','🅾️','🆘','❌','⭕','🛑','⛔','📛','🚫','💯','💢','♨️','🔞','📵','🔕','⚠️','☢️','☣️','✅','❎','🔰','♻️','🆚','💠','🔄','🔃','⬆️','⬇️','⬅️','➡️'] },
];

document.addEventListener('alpine:init', () => {
  Alpine.data('chatRoom', () => ({
    activeJid: '',
    activeName: '',
    messages: [],
    inputText: '',

    // Search
    searchOpen: false,
    searchQuery: '',
    searchResults: [],
    searchIdx: 0,

    // Reply
    replyTo: null,

    // Context menu & Reaction
    ctxVisible: false,
    ctxMsg: null,
    ctxX: 0, ctxY: 0,
    reactPickerVisible: false,
    reactX: 0, reactY: 0, 
    quickEmojis: ['👍','❤️','😂','😮','😢','🙏'],

    // Emoji
    emojiOpen: false,
    emojiCats: EMOJI_CATS,
    emojiCatIdx: 0,

    // Attach
    attachOpen: false,

    // Lightbox
    lightboxUrl: null,

    // Audio playback
    playingId: null,
    _audioEl: null,

    // Recording
    recording: false,
    _recorder: null,
    _recChunks: [],
    _recInterval: null,
    recSecs: 0,
    get recTimerLabel() {
      const m = Math.floor(this.recSecs / 60).toString().padStart(2,'0');
      const s = (this.recSecs % 60).toString().padStart(2,'0');
      return m + ':' + s;
    },

    // Typing
    _typingTimeout: null,
    typingText: '',

    // Toasts
    toasts: [],

    // ── LOAD CHAT ────────────────────────────────────────────
    loadChat(data) {
      this.activeJid  = data.jid;
      this.activeName = data.name;
      this.messages   = [];
      this.replyTo    = null;
      this.searchOpen = false;
      this.searchQuery = '';
      this.searchResults = [];

      fetch(`/api/messages/${this.activeJid}`)
        .then(r => r.json())
        .then(d => {
          if (Array.isArray(d)) {
            this.messages = d;
          } else {
            this.messages = [];
          }
          this.scrollToBottom(); 
        })
        .catch(() => this.toast("Gagal memuat riwayat pesan"));

      fetch(`/api/read/${this.activeJid}`, { method: 'POST' }).catch(() => {});
    },

    // ── INCOMING WS ──────────────────────────────────────────
    handleIncoming(msg) {
      if (!msg) return;

      if (msg.type === 'status_update' || msg.content === '[STATUS_UPDATE]') {
        const idx = this.messages.findIndex(m => m.id === msg.id);
        if (idx !== -1) this.messages[idx].status = msg.status;
        return;
      }

      if (msg.type === 'typing') {
        if (msg.chat_jid === this.activeJid) {
          this.typingText = (msg.sender_name || 'Mengetik') + ' sedang mengetik...';
          clearTimeout(this._typingTimeout);
          this._typingTimeout = setTimeout(() => this.typingText = '', 3000);
        }
        return;
      }

      if (msg.chat_jid === this.activeJid) {
        this.messages.push(msg);
        this.scrollToBottom();
      }
    },

    // ── SEND TEXT ─────────────────────────────────────────────
    sendMsg() {
      const text = this.inputText.trim();
      if (!text || !this.activeJid) return;

      const payload = {
        jid: this.activeJid,
        message: text,
      };

      this.inputText = '';
      this.replyTo   = null;
      this.$nextTick(() => { this.autoResize(this.$refs.textInput); });

      fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).catch(() => this.toast('Gagal mengirim pesan'));
    },

    // ── TYPING PRESENCE ───────────────────────────────────────
    sendTyping() {},

    // ── MOCK FEATURE UNTUK BACKEND YANG BELUM TERSEDIA ────────
    sendReaction(msg, emoji) {
      this.toast('Fitur reaksi emoji segera hadir.');
    },

    revokeMsg(msg) {
      this.toast('Fitur hapus pesan (revoke) segera hadir.');
    },

    uploadFile(event, type) {
      this.toast('Fitur kirim media (gambar/audio/dok) segera hadir.');
      event.target.value = ''; 
    },

    startRecording() {
      this.toast('Fitur Voice Note segera hadir.');
    },

    stopRecording() {},

    ctxStar() {
      this.toast('Fitur bintangi pesan segera hadir.');
      this.ctxVisible = false;
    },

    ctxForward() {
      this.toast('Fitur teruskan pesan segera hadir.');
      this.ctxVisible = false;
    },

    showContactInfo() {
      this.toast('Info kontak: fitur segera hadir.');
      this.ctxVisible = false;
    },

    closeChat() {
      this.activeJid = '';
      this.ctxVisible = false;
    },

    // ── DELETE LOCAL ──────────────────────────────────────────
    deleteLocal(msg) {
      this.messages = this.messages.filter(m => m.id !== msg.id);
    },

    // ── FILE UPLOAD (MOCK) ────────────────────────────────────
    triggerFile(type) {
      this.attachOpen = false;
      this.$nextTick(() => {
        if (type === 'document') this.$refs.fileDocument.click();
        else if (type === 'image') this.$refs.fileImage.click();
        else if (type === 'audio') this.$refs.fileAudio.click();
      });
    },

    // ── AUDIO PLAYBACK ────────────────────────────────────────
    playAudio(msg) {
      const url = msg.media_url || '/api/media/' + msg.id;
      if (this.playingId === msg.id && this._audioEl) {
        this._audioEl.pause();
        this.playingId = null;
        return;
      }
      if (this._audioEl) this._audioEl.pause();
      this._audioEl = new Audio(url);
      this._audioEl.play();
      this.playingId = msg.id;
      this._audioEl.onended = () => this.playingId = null;
    },

    // ── SEARCH ────────────────────────────────────────────────
    toggleSearch() {
      this.searchOpen = !this.searchOpen;
      if (this.searchOpen) {
        this.$nextTick(() => this.$refs.searchInput && this.$refs.searchInput.focus());
      } else {
        this.searchQuery   = '';
        this.searchResults = [];
      }
    },

    doSearch() {
      const q = this.searchQuery.trim().toLowerCase();
      if (!q) { this.searchResults = []; return; }
      this.searchResults = this.messages
        .filter(m => m.content && m.content.toLowerCase().includes(q))
        .map(m => m.id);
      this.searchIdx = 0;
      if (this.searchResults.length) this.scrollToMsg(this.searchResults[0]);
    },

    nextMatch() {
      if (!this.searchResults.length) return;
      this.searchIdx = (this.searchIdx + 1) % this.searchResults.length;
      this.scrollToMsg(this.searchResults[this.searchIdx]);
    },

    prevMatch() {
      if (!this.searchResults.length) return;
      this.searchIdx = (this.searchIdx - 1 + this.searchResults.length) % this.searchResults.length;
      this.scrollToMsg(this.searchResults[this.searchIdx]);
    },

    highlightText(text) {
      if (!text) return '';
      const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const escaped = esc(text);
      if (!this.searchQuery.trim()) return escaped;
      
      const q = this.searchQuery.trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      return escaped.replace(new RegExp(q,'gi'), m => `<mark>${m}</mark>`);
    },

    // ── CONTEXT MENU & REACTION ──────────────────────────────
    openCtx(evt, msg) {
      this.ctxMsg   = msg;
      this.ctxVisible = true;
      this.reactPickerVisible = false;
      const vw = window.innerWidth, vh = window.innerHeight;
      this.ctxX = Math.min(evt.clientX, vw - 220); 
      this.ctxY = Math.min(evt.clientY, vh - 380); 
    },

    showChatMenu(evt) {
      this.ctxMsg = null;
      this.ctxVisible = true;
      this.reactPickerVisible = false;
      this.ctxX = Math.max(evt.clientX - 180, 10);
      this.ctxY = evt.clientY + 8;
    },

    ctxReact() {
      this.reactX = this.ctxX;
      this.reactY = Math.max(10, this.ctxY - 50);  
      
      this.reactPickerVisible = true;
      this.ctxVisible = false;
    },

    closeAll() {
      this.ctxVisible = false;
      this.reactPickerVisible = false;
      this.emojiOpen  = false;
      this.attachOpen = false;
    },

    ctxReply() {
      this.replyTo = this.ctxMsg;
      this.ctxVisible = false;
      this.$nextTick(() => this.$refs.textInput && this.$refs.textInput.focus());
    },

    ctxCopy() {
      if (this.ctxMsg && this.ctxMsg.content) {
        navigator.clipboard.writeText(this.ctxMsg.content)
          .then(() => this.toast('Pesan disalin'));
      }
      this.ctxVisible = false;
    },

    ctxDelete() {
      if (!this.ctxMsg) return;
      this.deleteLocal(this.ctxMsg);
      this.ctxVisible = false;
    },

    // ── HELPERS ───────────────────────────────────────────────
    scrollToBottom() {
      this.$nextTick(() => {
        const el = document.getElementById('chat-box');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    scrollToMsg(id) {
      this.$nextTick(() => {
        const el = document.querySelector(`[data-id="${id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    },

    autoResize(el) {
      if (!el) return;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    },

    newLine() {
      this.inputText += '\n';
      this.$nextTick(() => this.autoResize(this.$refs.textInput));
    },

    insertEmoji(e) {
      this.inputText += e;
      this.$nextTick(() => this.$refs.textInput && this.$refs.textInput.focus());
    },

    downloadMedia(msg) {
      const url = msg.media_url || '/api/media/' + msg.id;
      const a = document.createElement('a');
      a.href = url; a.download = msg.filename || 'file';
      a.click();
    },

    openLightbox(url) { this.lightboxUrl = url; },

    toast(msg) {
      const id = Date.now() + Math.random();
      this.toasts.push({ id, msg });
      setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3000);
    },

    senderColor(name) {
      if (!name) return '#e53935';
      const p = ['#e53935','#8e24aa','#3949ab','#00897b','#f4511e','#6d4c41','#546e7a','#039be5','#43a047'];
      let h = 0;
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
      return p[Math.abs(h) % p.length];
    },
  }));
});
